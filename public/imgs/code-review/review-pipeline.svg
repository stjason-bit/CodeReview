<svg width="900" height="680" viewBox="0 0 900 680" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Code review pipeline illustration</title>
  <desc id="desc">A diagram showing rules, LLM reasoning, human confirmation, and exportable reports in one review pipeline.</desc>
  <rect width="900" height="680" rx="28" fill="#F8FAFC"/>
  <rect x="56" y="56" width="788" height="568" rx="24" fill="white" stroke="#E2E8F0"/>
  <text x="96" y="112" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">Review pipeline</text>
  <text x="96" y="144" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="500">Explainable signals become confirmed engineering decisions.</text>
  <g stroke="#CBD5E1" stroke-width="3">
    <path d="M180 252H720"/>
    <path d="M360 252V408"/>
    <path d="M540 252V408"/>
  </g>
  <g>
    <rect x="96" y="196" width="168" height="112" rx="18" fill="#EFF6FF" stroke="#BFDBFE"/>
    <circle cx="130" cy="232" r="17" fill="#2563EB"/>
    <path d="M120 232H140M130 222V242" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <text x="96" y="340" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">ZIP snapshot</text>
    <text x="96" y="366" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="500">Bounded upload</text>

    <rect x="276" y="196" width="168" height="112" rx="18" fill="#F0FDF4" stroke="#BBF7D0"/>
    <circle cx="310" cy="232" r="17" fill="#22C55E"/>
    <path d="M300 232L307 239L321 223" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="276" y="340" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Rule scan</text>
    <text x="276" y="366" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="500">Known patterns</text>

    <rect x="456" y="196" width="168" height="112" rx="18" fill="#FFF7ED" stroke="#FED7AA"/>
    <circle cx="490" cy="232" r="17" fill="#F59E0B"/>
    <path d="M482 232H498M490 224V240" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <text x="456" y="340" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">LLM review</text>
    <text x="456" y="366" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="500">Cross-file context</text>

    <rect x="636" y="196" width="168" height="112" rx="18" fill="#FEF2F2" stroke="#FECACA"/>
    <circle cx="670" cy="232" r="17" fill="#EF4444"/>
    <path d="M662 232H678" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <text x="636" y="340" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Risk score</text>
    <text x="636" y="366" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="500">Prioritized report</text>
  </g>
  <g>
    <rect x="216" y="408" width="468" height="136" rx="20" fill="#0F172A"/>
    <text x="248" y="452" fill="#E2E8F0" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Human confirmation layer</text>
    <rect x="248" y="480" width="104" height="32" rx="10" fill="#1E293B"/>
    <text x="268" y="502" fill="#93C5FD" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700">Open</text>
    <rect x="368" y="480" width="134" height="32" rx="10" fill="#1E293B"/>
    <text x="388" y="502" fill="#FCD34D" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700">Needs review</text>
    <rect x="518" y="480" width="110" height="32" rx="10" fill="#1E293B"/>
    <text x="538" y="502" fill="#86EFAC" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700">Fixed</text>
  </g>
</svg>
